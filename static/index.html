<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<title>WhiteBook</title>
		<script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<script defer src="/static/markdownFormatter.js"></script>
		<link rel="stylesheet" href="/static/style.css" />
		<link rel="stylesheet" href="/static/mobile.css" />
		<script defer src="/static/app.js"></script>
	</head>
	<body>
		<div class="app-shell">
			<aside id="session-sidebar" class="sidebar" aria-label="Chat Sessions">
				<div class="sidebar-shell">
					<div class="sidebar-section">
						<button id="new-session-button" class="secondary-button" type="button">New chat</button>
						<div id="session-list" class="session-list" role="list"></div>
					</div>
				</div>
			</aside>

			<div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

			<div class="chat-pane">
				<header class="app-header">
					<button id="sidebar-toggle" class="icon-button mobile-only" type="button" aria-label="Open chat sessions">
						<span class="menu-line"></span>
						<span class="menu-line"></span>
						<span class="menu-line"></span>
					</button>
					<h1 class="app-title mobile-only">WhiteBook</h1>
				</header>

				<main id="chat-history" class="chat-history" aria-live="polite" aria-relevant="additions text"></main>

				<footer class="composer-shell">
					<div id="tools-toggle-container">
						<input type="checkbox" id="tools-toggle" />
						<label for="tools-toggle">
							<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
								<line x1="8" y1="6" x2="16" y2="6"></line>
								<line x1="16" y1="14" x2="16" y2="18"></line>
								<path d="M16 10h.01"></path>
								<path d="M12 10h.01"></path>
								<path d="M8 10h.01"></path>
								<path d="M12 14h.01"></path>
								<path d="M8 14h.01"></path>
								<path d="M12 18h.01"></path>
								<path d="M8 18h.01"></path>
							</svg>
							Calculate
						</label>

						<input type="checkbox" id="think-toggle" />
						<label for="think-toggle">
							<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<path d="M9 18h6"></path>
								<path d="M10 22h4"></path>
								<path d="M12 2a7 7 0 0 0-7 7c0 2.32 1.15 4.38 2.92 5.64a9 9 0 0 0 1.08 6.36h8a9 9 0 0 0 1.08-6.36C19.85 13.38 21 11.32 21 9a7 7 0 0 0-7-7z"></path>
							</svg>
							Thinking
						</label>
					</div>
					<form id="chat-form" class="composer" autocomplete="off">
						<label class="sr-only" for="chat-input">Ask a question</label>
						<textarea
							id="chat-input"
							name="query"
							rows="1"
							placeholder="Ask the MGH WhiteBook a clinical question..."
							spellcheck="false"
						></textarea>
						<button type="submit" id="send-button" aria-label="Send message">→</button>
					</form>
				</footer>
			</div>
		</div>
	</body>
</html>
